apiVersion: v1
kind: ServiceAccount
metadata:
  name: offramp-operator
  namespace: offramp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: offramp-operator
rules:
  - apiGroups: [offramp.attic.ai]
    resources: [offrampsecretmounts, offrampsecretmounts/status]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: offramp-operator
subjects:
  - kind: ServiceAccount
    name: offramp-operator
    namespace: offramp-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: offramp-operator
