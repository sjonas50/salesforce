# Customer-side CRD: declares which Vault / KMS secrets to materialize for
# the Off-Ramp pods to consume.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: offrampsecretmounts.offramp.attic.ai
spec:
  group: offramp.attic.ai
  names:
    kind: OfframpSecretMount
    plural: offrampsecretmounts
    singular: offrampsecretmount
    shortNames: [osm]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [source, target]
              properties:
                source:
                  type: object
                  required: [provider, identifier]
                  properties:
                    provider:
                      type: string
                      enum: [vault, kms, file]
                    identifier:
                      type: string
                      description: Vault path, KMS arn, or file path
                target:
                  type: object
                  required: [secretName, mountPath]
                  properties:
                    secretName:
                      type: string
                    mountPath:
                      type: string
                rotation:
                  type: object
                  properties:
                    intervalHours:
                      type: integer
                      default: 168  # weekly
            status:
              type: object
              properties:
                lastSynced:
                  type: string
                error:
                  type: string
