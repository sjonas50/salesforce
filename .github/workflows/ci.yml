name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest -m "not integration and not smoke and not load" --cov

      - name: Smoke tests (mocked SF backend in Phase 0)
        run: uv run pytest -m smoke

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for gitleaks to scan all commits.
          fetch-depth: 0

      # Use the upstream gitleaks binary action — gitleaks/gitleaks-action@v2
      # requires a paid license for organizations.
      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.20.1/gitleaks_8.20.1_linux_x64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: gitleaks scan
        run: gitleaks detect --source . --no-git --redact --verbose

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1
          # Skip the venv + generated artifacts dirs.
          skip-dirs: ".venv,out,artifacts,infra/terraform/.terraform"
