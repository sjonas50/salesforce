# Pre-commit hooks. Install with `make hooks`.
# CI re-runs these so a passing local commit does not bypass enforcement.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - structlog>=24.1
          - httpx>=0.27
        args: [--config-file=pyproject.toml]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: matrix-fixture-guard
        name: translation matrix fixture guard
        entry: uv run python scripts/check_matrix_fixtures.py
        language: system
        # Fires when generate/ or related fixtures change. The script no-ops
        # cleanly until Phase 3 lands the matrix file.
        files: ^(src/offramp/generate/.*|tests/.*/fixtures/translation_matrix/.*)$
        pass_filenames: false
